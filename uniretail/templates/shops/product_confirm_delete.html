{% extends "base.html" %}
{% block title %}Delete Product{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-danger">
        <div class="card-body p-4 text-center">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2.5rem"></i>
          <h4 class="fw-bold mt-3">Delete Product?</h4>
          <p class="text-muted">
            Are you sure you want to delete <strong>"{{ product.name }}"</strong>?
            This action cannot be undone.
          </p>
          <form method="post" class="d-flex gap-2 justify-content-center mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-trash me-2"></i>Yes, Delete
            </button>
            <a href="{% url 'shops:product_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
