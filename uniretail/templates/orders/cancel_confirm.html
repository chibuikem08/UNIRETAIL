{% extends "base.html" %}
{% block title %}Cancel Order{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-danger">
        <div class="card-body p-4 text-center">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2.5rem"></i>
          <h4 class="fw-bold mt-3">Cancel Order #{{ order.pk }}?</h4>
          <p class="text-muted">
            This will cancel your order and restore the stock. This cannot be undone.
          </p>
          <form method="post" class="d-flex gap-2 justify-content-center mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-x-circle me-2"></i>Yes, Cancel
            </button>
            <a href="{% url 'orders:order_detail' order.pk %}" class="btn btn-outline-secondary px-4">
              Go Back
            </a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
